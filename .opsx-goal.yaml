goal_id: visdoc.phase5i.gated_tiny_real_pilot
created: 2026-07-05
change: run-phase-5i-gated-tiny-real-pilot
status: applying
worktree:
  path: .worktrees/phase-5i-gated-tiny-real-pilot
  branch: codex/phase-5i-gated-tiny-real-pilot
  base_ref: origin/main
execution_policy:
  profile: practical
  commit: allowed_after_validation
  push: allowed_after_validation
  merge: forbidden
  archive_openspec: forbidden
  deploy: forbidden
  gpu: allowed_only_when_all_gates_pass_and_safe_gpu_exists
  network_required: false
goal:
  summary: >
    Complete Phase 5I gated tiny real-pilot attempt on the A100 runtime using
    the exact local model path and existing training gate, then commit only
    sanitized metadata, run card, safety checks, dev-only evidence, and phase
    closeout artifacts without downloading models, using final test, or making
    benchmark claims.
  default_command: >
    PYTHONPATH=src python -m visdoc_retrieve.train_lora_pilot --config
    local/train_lora_pilot.phase5i.local.json
acceptance:
  required_artifacts:
    - openspec/changes/run-phase-5i-gated-tiny-real-pilot/proposal.md
    - openspec/changes/run-phase-5i-gated-tiny-real-pilot/design.md
    - openspec/changes/run-phase-5i-gated-tiny-real-pilot/specs/gated-tiny-real-pilot-attempt/spec.md
    - openspec/changes/run-phase-5i-gated-tiny-real-pilot/tasks.md
    - src/visdoc_retrieve/train_lora_pilot.py
    - src/visdoc_retrieve/training_pilot.py
    - tests/test_training_pilot_launch_gate.py
    - reports/training-pilot/phase-5i-environment-check.json
    - reports/training-pilot/phase-5i-safety-check.json
    - reports/training-pilot/phase-5i-pilot-run-card.md
    - reports/training-pilot/phase-5i-blocked-run-card.md
    - reports/training-pilot/phase-5i-adapter-manifest.sanitized.json
    - reports/training-pilot/phase-5i-dev-eval.json
    - docs/human-briefs/2026-07-05-gated-tiny-real-pilot.html
    - reports/progress-ledger.yaml
  required_validation:
    - PYTHONPATH=src python -m visdoc_retrieve.run_mvp --config configs/mvp.json
    - PYTHONPATH=src python -m visdoc_retrieve.mine_hard_negatives --config configs/hard_negatives.json
    - PYTHONPATH=src python -m visdoc_retrieve.train_lora_dry_run --config configs/train_lora_dry_run.json
    - PYTHONPATH=src python -m visdoc_retrieve.train_lora_pilot --config configs/train_lora_pilot.local.example.json || test $? -eq 2
    - python -m py_compile src/visdoc_retrieve/*.py
    - pyproject tomllib parse
    - pytest -q
    - ruff check .
    - mypy src
    - openspec validate --all --strict
    - git diff --check
hard_stops:
  - model download or network model resolution
  - final test evaluation
  - benchmark improvement or model superiority claim
  - committed model weights, adapter checkpoints, training caches, tensorboard logs, or wandb logs
  - committed private local model path or private local config
  - treating pilot loss, blocked evidence, or dev-only sanity as model improvement
  - merge, deploy, or OpenSpec archive
phase_state:
  active_phase: phase-5i-gated-tiny-real-pilot
  goal_complete_checkpoint: false
